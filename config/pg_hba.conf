# =============================================================================
# pg_hba.conf  -- VOIDcore
# =============================================================================
# TYPE     DATABASE        USER            ADDRESS                 METHOD
# =============================================================================

# Local socket (sysop CLI inside the container)
local      all             all                                     trust

# App connections
host       voidcore       voidcore_app       samenet                 scram-sha-256

# Superuser only from same container network (init scripts, manual repair)
host       all             postgres        samenet                 scram-sha-256

# Reject everything else explicitly
host       all             all             all                     reject
